[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/book"
  to = "https://hotels.cloudbeds.com/reservation/lWSPnI"
  status = 302

[[redirects]]
  from = "/book-now"
  to = "https://hotels.cloudbeds.com/reservation/lWSPnI"
  status = 302

[[redirects]]
  from = "/reservation"
  to = "https://hotels.cloudbeds.com/reservation/lWSPnI"
  status = 302

[[redirects]]
  from = "/comfortable-extended-stay-suites-dallas/"
  to = "/comfortable-extended-stay-suites-dallas.html"
  status = 200

[[redirects]]
  from = "/professional-extended-stay-central-dallas/"
  to = "/professional-extended-stay-central-dallas.html"
  status = 200

[[redirects]]
  from = "/furnished-monthly-stays-downtown-dallas/"
  to = "/furnished-monthly-stays-downtown-dallas.html"
  status = 200

[[redirects]]
  from = "/pet-friendly-apartments-medical-travelers-dallas/"
  to = "/pet-friendly-apartments-medical-travelers-dallas.html"
  status = 200
